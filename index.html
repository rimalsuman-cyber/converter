<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Converter</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="converter-panel" aria-labelledby="app-title">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Quick tools</p>
            <h1 id="app-title">Converter</h1>
          </div>
          <button class="icon-button" id="swapButton" type="button" aria-label="Swap units" title="Swap units">
            <span aria-hidden="true">Swap</span>
          </button>
        </div>

        <div class="tabs" role="tablist" aria-label="Converter categories">
          <button class="tab active" type="button" data-category="length">Length</button>
          <button class="tab" type="button" data-category="weight">Weight</button>
          <button class="tab" type="button" data-category="temperature">Temp</button>
          <button class="tab" type="button" data-category="volume">Volume</button>
          <button class="tab" type="button" data-category="area">Area</button>
          <button class="tab" type="button" data-tool="timezone">Time Zone</button>
          <button class="tab" type="button" data-tool="qr">QR Code</button>
          <button class="tab" type="button" data-tool="scientific">Scientific</button>
          <button class="tab" type="button" data-tool="tax">GST/VAT</button>
          <button class="tab" type="button" data-tool="percentage">Percent</button>
          <button class="tab" type="button" data-tool="age">Age</button>
        </div>

        <form class="converter-grid" id="converterForm">
          <label class="field">
            <span>From</span>
            <input id="fromValue" type="number" inputmode="decimal" value="1" step="any">
          </label>

          <label class="field">
            <span>Unit</span>
            <select id="fromUnit"></select>
          </label>

          <label class="field">
            <span>To</span>
            <input id="toValue" type="number" inputmode="decimal" step="any">
          </label>

          <label class="field">
            <span>Unit</span>
            <select id="toUnit"></select>
          </label>
        </form>

        <section class="tool-panel" id="toolPanel" hidden></section>

        <div class="result-strip" aria-live="polite">
          <span id="resultText">1 meter = 3.28084 feet</span>
          <button id="copyButton" type="button">Copy</button>
        </div>
      </section>

      <aside class="history-panel" aria-labelledby="history-title">
        <div class="panel-heading compact">
          <h2 id="history-title">Recent</h2>
          <button id="clearButton" type="button">Clear</button>
        </div>
        <ol id="historyList" class="history-list"></ol>
      </aside>
    </main>

    <script src="script.js"></script>
  </body>
</html>
